<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Faz Bem</title>
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>

  <div class="container">
    <div class="brand">
      <span>🌿</span>
      <h1>Crie sua Conta</h1>
      <p>Junte-se ao clube e receba saúde em casa.</p>
    </div>

    <form id="formCadastro">

      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha" required>
      </div>

      <div class="row">
        <div class="col form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" required>
        </div>
        <div class="col form-group">
          <label for="telefone">WhatsApp</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
        </div>
      </div>

      <div class="form-group">
        <label for="endereco">Endereço de Entrega</label>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="endereco" placeholder="Rua e Número" required style="flex: 1;">
          <button type="button" id="btnBuscarMapa" class="btn" style="width: auto; padding: 0 15px;">🔍 Buscar</button>
        </div>
        <small style="color:#666; font-size:12px; margin-top:4px; display:block;">
          Digite o endereço, clique em Buscar e arraste o pino no mapa para o local exato da sua casa.
        </small>
      </div>

      <div class="form-group">
        <div id="map-cadastro"
          style="height: 250px; width: 100%; border-radius: 8px; border: 1px solid #ccc; z-index: 1;"></div>
        <input type="hidden" id="latitude" required>
        <input type="hidden" id="longitude" required>
      </div>

      <div class="form-group">
        <label for="referencia">Ponto de Referência</label>
        <input type="text" id="referencia" placeholder="Ex: Próximo ao mercado...">
      </div>

      <div class="form-group">
        <label for="frequencia">Frequência da Assinatura</label>
        <select id="frequencia" required>
          <option value="" disabled selected>Escolha seu plano...</option>
          <option value="Semanal">📅 Semanal (Toda semana)</option>
          <option value="Quinzenal">🗓 Quinzenal (A cada 15 dias)</option>
        </select>
        <small style="color:#666; font-size:12px; margin-top:4px; display:block;">
          Você poderá pausar ou mudar o plano depois.
        </small>
      </div>

      <button type="submit" class="btn" id="btnCadastrar">Finalizar Cadastro</button>
    </form>

    <div class="login-link">
      Já tem uma conta? <a href="login.html">Fazer Login</a>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/cadastro.js"></script>
</body>

</html>
