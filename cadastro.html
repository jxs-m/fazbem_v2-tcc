<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — Faz Bem</title>
  <style>
    :root {
        --green-primary: #2b8a3e;
        --green-light: #dcfce7;
        --text-dark: #1f2937;
        --bg-color: #f0fdf4;
    }

    body { 
        margin: 0; 
        font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        background: var(--bg-color); 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        padding: 20px; 
        box-sizing: border-box; 
        color: var(--text-dark);
    }

    .container { 
        background: white; 
        padding: 40px; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); 
        width: 100%; 
        max-width: 500px; 
    }

    .brand {
        text-align: center;
        margin-bottom: 30px;
    }

    .brand span { font-size: 40px; display: block; margin-bottom: 10px; }
    .brand h1 { margin: 0; color: var(--green-primary); font-size: 24px; }
    .brand p { margin: 5px 0 0; color: #6b7280; font-size: 14px; }

    .form-group { margin-bottom: 16px; }
    
    label { 
        display: block; 
        margin-bottom: 6px; 
        font-weight: 600; 
        color: #374151; 
        font-size: 14px; 
    }

    input, select { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid #d1d5db; 
        border-radius: 8px; 
        font-size: 15px; 
        box-sizing: border-box; 
        transition: border-color 0.2s;
        outline: none;
    }

    input:focus, select:focus { 
        border-color: var(--green-primary); 
        box-shadow: 0 0 0 3px var(--green-light); 
    }

    .row { display: flex; gap: 15px; }
    .col { flex: 1; }

    .btn { 
        background: var(--green-primary); 
        color: white; 
        width: 100%; 
        padding: 14px; 
        border: none; 
        border-radius: 8px; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: background 0.2s; 
        margin-top: 10px; 
    }

    .btn:hover { background: #15803d; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }

    .login-link { 
        text-align: center; 
        margin-top: 24px; 
        font-size: 14px; 
        color: #6b7280; 
    }

    .login-link a { 
        color: var(--green-primary); 
        text-decoration: none; 
        font-weight: 700; 
    }
    
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">
    <div class="brand">
        <span>🌿</span>
        <h1>Crie sua Conta</h1>
        <p>Junte-se ao clube e receba saúde em casa.</p>
    </div>

    <form id="formCadastro">
      
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha" required>
      </div>

      <div class="row">
        <div class="col form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" required>
        </div>
        <div class="col form-group">
            <label for="telefone">WhatsApp</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
        </div>
      </div>

      <div class="form-group">
        <label for="endereco">Endereço de Entrega</label>
        <input type="text" id="endereco" placeholder="Rua, Número, Bairro" required>
      </div>

      <div class="form-group">
        <label for="referencia">Ponto de Referência</label>
        <input type="text" id="referencia" placeholder="Ex: Próximo ao mercado...">
      </div>

      <div class="form-group">
        <label for="frequencia">Frequência da Assinatura</label>
        <select id="frequencia" required>
            <option value="" disabled selected>Escolha seu plano...</option>
            <option value="Semanal">📅 Semanal (Toda semana)</option>
            <option value="Quinzenal">🗓 Quinzenal (A cada 15 dias)</option>
            <option value="Mensal">📆 Mensal (Uma vez por mês)</option>
        </select>
        <small style="color:#666; font-size:12px; margin-top:4px; display:block;">
            Você poderá pausar ou mudar o plano depois.
        </small>
      </div>

      <button type="submit" class="btn" id="btnCadastrar">Finalizar Cadastro</button>
    </form>
    
    <div class="login-link">
      Já tem uma conta? <a href="login.html">Fazer Login</a>
    </div>
  </div>

  <script>
    document.getElementById('formCadastro').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnCadastrar');
      const originalText = btn.innerText;
      
      
      btn.innerText = "Criando conta...";
      btn.disabled = true;

      
      const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value,
        cpf: document.getElementById('cpf').value,
        telefone: document.getElementById('telefone').value,
        endereco: document.getElementById('endereco').value,
        referencia: document.getElementById('referencia').value,
        frequencia: document.getElementById('frequencia').value
      };

      try {
        
        const response = await fetch('api_cadastro_v2.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        
        const text = await response.text();
        let json;
        try {
            json = JSON.parse(text);
        } catch (err) {
            console.error("Resposta inválida do servidor:", text);
            throw new Error("Erro técnico no servidor.");
        }

        if (json.success) {
          alert('✅ Cadastro realizado com sucesso!\n\nVocê será redirecionado para o login.');
          window.location.href = 'login.html';
        } else {
          alert('❌ Erro: ' + json.message);
        }

      } catch (error) {
        alert('Erro de conexão ao cadastrar. Tente novamente.');
        console.error(error);
      } finally {
       
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
