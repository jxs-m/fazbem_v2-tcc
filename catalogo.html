<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Faz Bem</title>
  <link rel="stylesheet" href="css/catalogo.css">
</head>

<body>
  <header>
    <a href="catalogo.html" class="brand">
      <span>🌿</span> Faz Bem
    </a>
    <div class="header-actions">
      <a href="perfil.html" class="btn-profile">
        <span class="icon">👤</span>
        <span>Perfil</span>
      </a>
      <div class="cart-summary" onclick="window.location.href='carrinho.html'">
        🛒 <span id="cart-count">0</span>
      </div>
    </div>
  </header>

  <main>
    <div class="alert-box">
      <div class="alert-content">
        <strong>Facilite sua semana!</strong>
        <span>Deseja carregar os mesmos itens da semana passada?</span>
      </div>
      <button class="btn-repeat" onclick="repetirPedido()">↻ Repetir Pedido Anterior</button>
    </div>

    <div id="catalogo-container">
      <div style="text-align:center; padding:60px; color:#9ca3af;">
        Carregando produtos fresquinhos...
      </div>
    </div>
  </main>

  <div id="modalAdicionarProduto" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; padding:20px; border-radius:10px; width:90%; max-width:400px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
      <h3 id="modalAddNome" style="margin-top:0; color:#166534; font-size:18px;">Produto...</h3>
      <p id="modalAddPrecoBase" style="color:#666; font-size:14px; margin-bottom:15px;"></p>
      
      <div id="modalAddCalcArea" style="background:#f9fafb; padding:15px; border-radius:8px; margin-bottom:15px;">
        <label id="modalAddLabel" style="display:block; font-weight:bold; margin-bottom:8px; font-size:14px; color:#374151;">Como deseja levar?</label>
        
        <div style="display:flex; gap:10px; margin-bottom:10px;" id="modalAddTipoContainer">
          <button id="btnTipoUnidade" class="btn" style="flex:1; background:#dcfce7; color:#166534; border:1px solid #166534;" onclick="setTipoCompraModal('Unidade')">Por Unidade</button>
          <button id="btnTipoPeso" class="btn" style="flex:1; background:#f3f4f6; color:#4b5563; border:1px solid #d1d5db;" onclick="setTipoCompraModal('Peso')">Por Peso (g)</button>
        </div>

        <input type="number" id="modalAddQtd" value="1" min="1" step="1" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-size:16px; text-align:center;" oninput="calcularEstimativaModal()">
        <small id="modalAddHint" style="display:block; text-align:center; color:#6b7280; margin-top:5px; font-size:12px;">Ex: 10 unidades</small>
      </div>

      <div style="background:#fffbeb; padding:12px; border-radius:8px; border:1px solid #fde68a; margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
          <span style="color:#92400e; font-size:13px;">Peso Estimado:</span>
          <strong id="modalAddPesoEst" style="color:#92400e; font-size:13px;">...</strong>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:#92400e; font-size:14px; font-weight:bold;">Preço Estimado:</span>
          <strong id="modalAddPrecoEst" style="color:#b45309; font-size:18px;">R$ 0,00</strong>
        </div>
        <div style="font-size:11px; color:#b45309; margin-top:8px; text-align:center; line-height:1.2;">
          *O valor final será ajustado após a pesagem real pela nossa equipe.
        </div>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:#e5e7eb; color:#374151;" onclick="document.getElementById('modalAdicionarProduto').style.display='none'">Cancelar</button>
        <button class="btn" style="flex:2; background:#16a34a; color:white; font-weight:bold;" onclick="confirmarAdicaoModal()">Confirmar Pedido</button>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="js/catalogo.js"></script>
</body>

</html>
