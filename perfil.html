<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Faz Bem</title>
    <link rel="stylesheet" href="css/perfil.css">
</head>

<body>

  <header>
    <div class="header-left">
      <a href="catalogo.html" class="back-btn">←</a>
      <h1>Meu Perfil</h1>
    </div>
    <a href="logout.php" class="btn-logout">Sair</a>
  </header>

  <main>

    <div class="card">
      <h2>Minha Assinatura</h2>
      <div class="status-box">
        <div id="status-badge" class="status-badge st-ativa">Carregando...</div>

        <div class="plan-selector">
          <select id="select-plano">
            <option value="Semanal">Semanal</option>
            <option value="Quinzenal">Quinzenal</option>
            <option value="Mensal">Mensal</option>
          </select>
          <button class="btn-change-plan" onclick="mudarPlano()">Alterar</button>
        </div>

        <div class="btn-group" id="btn-container"></div>
        <button class="btn btn-cancel" onclick="alterarStatus('cancelar')">Cancelar Assinatura</button>
      </div>
    </div>

    <div class="card">
      <h2>Histórico de Pedidos</h2>
      <table id="tabela-pedidos">
        <thead>
          <tr>
            <th>Data / Detalhes</th>
            <th style="text-align:right">Valor / Status</th>
          </tr>
        </thead>
        <tbody id="lista-pedidos"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Preferências Fixas</h2>
      <ul id="lista-prefs"></ul>
      <div class="input-group">
        <input type="text" id="nova-pref" placeholder="Nova preferência...">
        <button class="btn-add" onclick="salvarPreferencia()">+</button>
      </div>
    </div>

    <div class="card">
      <h2>Meus Dados</h2>
      <div id="dados-pessoais" style="font-size:14px; line-height:1.6; color:#444;"></div>
    </div>

  </main>

  <script src="utils.js"></script>
    <script src="js/perfil.js"></script>
</body>

</html>
