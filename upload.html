<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Produto V2</title>
    <link rel="stylesheet" href="css/upload.css">
</head>

<body>

    <div class="form-container">
        <h2>Cadastrar Novo Produto</h2>

        <form id="formUpload">
            <div class="form-group">
                <label>Nome do Produto</label>
                <input type="text" name="nome" required>
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select name="categoria">
                    <option value="Legumes">Legumes</option>
                    <option value="Verduras">Verduras</option>
                    <option value="Frutas">Frutas</option>
                    <option value="Processados">Processados</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Preço (R$)</label>
                    <input type="number" step="0.01" name="preco" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Unidade (ex: kg, un)</label>
                    <input type="text" name="unidade" value="un" required>
                </div>
            </div>

            <div class="form-group">
                <label>Estoque Inicial</label>
                <input type="number" name="estoque" value="10" required>
            </div>

            <div class="form-group">
                <label>Imagem Física (.jpg, .png, .webp)</label>
                <input type="file" name="imagem" accept="image/*" required onchange="mostrarPreview(this)">
                <img id="preview" alt="Pré-visualização">
            </div>

            <button type="button" class="btn" onclick="enviarProduto()">Salvar Produto</button>
            <div id="mensagem" class="status"></div>
        </form>
    </div>

    <script src="utils.js"></script>
    <script src="js/upload.js"></script>
</body>

</html>
