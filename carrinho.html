<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho — Faz Bem</title>
  <link rel="stylesheet" href="css/carrinho.css">
</head>

<body>

  <header>
    <a href="catalogo.html" class="back-btn">←</a>
    <h1>Minha Cesta</h1>
  </header>

  <main>
    <div id="lista-itens">
      <div style="text-align:center; padding:40px; color:#999">Sua cesta está vazia.</div>
    </div>

    <div id="nota-fiscal-box" style="display:none; background:#f0fdf4; padding:15px; border-radius:8px; margin:15px; border:1px solid #bbf7d0;">
      <h3 style="margin-top:0; font-size:16px; color:#166534; margin-bottom:10px;">🧾 Resumo Completo do Pedido</h3>
      <div id="nota-fiscal-content" style="font-size:14px; color:#374151; line-height:1.5;">Carregando...</div>
    </div>

    <div class="payment-section" id="pagamento-box" style="display:none">
      <h3 style="margin-top:0; font-size:16px;">Forma de Pagamento</h3>

      <label class="payment-option">
        <input type="radio" name="pagamento" value="PIX" checked>
        <div>
          <strong>PIX (Chave Aleatória)</strong>
          <div style="font-size:12px; color:#666">Envie o comprovante no WhatsApp</div>
        </div>
      </label>

      <label class="payment-option">
        <input type="radio" name="pagamento" value="Dinheiro">
        <div>
          <strong>Dinheiro na Entrega</strong>
          <div style="font-size:12px; color:#666">Pagamento para o entregador</div>
        </div>
      </label>
    </div>
  </main>

  <div class="footer-checkout">
    <div>
      <div class="total-label">Total a pagar</div>
      <div class="total-val" id="total-display">R$ 0,00</div>
      <div class="total-peso" id="peso-display" style="font-size:12px; color:#666"></div>
    </div>
    <button class="btn-finish" id="btn-finalizar" onclick="finalizarPedido()" disabled>Finalizar Pedido</button>
  </div>

  <script src="utils.js"></script>
  <script src="js/carrinho.js"></script>
</body>

</html>
